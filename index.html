<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Turnaround</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:rgba(17,24,39,.08);
      --shadow:0 10px 24px rgba(0,0,0,.08);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
    }

    .page-wrap{
      max-width: 1600px;
      margin: 0 auto;
      padding: 18px;
    }

    .dashboard-card{
      border-radius: 18px;
      box-shadow: var(--shadow);
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      height: 100%;
    }

    .dashboard-card .card-content{
      padding: 1rem;
    }

    .flight-title{
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .flight-subtitle{
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
    }

    .muted{
      color: var(--muted);
    }

    .kv-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: .75rem;
      margin-top: .75rem;
      margin-bottom: .9rem;
    }

    .kv-box{
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .8rem;
      background: rgba(255,255,255,.55);
    }

    .kv-k{
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: .25rem;
    }

    .kv-v{
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .cd-value{
      font-size: 1.25rem;
      font-weight: 900;
    }

    .timeline-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:.45rem;
      margin-top:.35rem;
    }

    .timeline-chip{
      border-radius: 999px;
      padding: .4rem .7rem;
      font-size: .78rem;
      font-weight: 800;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
    }

    .timeline-chip.is-done{
      background: #e8f0ff;
      color: #0f3d91;
      border-color: #bcd0ff;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
      flex-wrap:wrap;
      margin-bottom: 1rem;
    }

    .topbar h1{
      font-size: 1.5rem;
      font-weight: 900;
      margin: 0;
    }

    .empty-box{
      border: 2px dashed var(--border);
      border-radius: 18px;
      padding: 2rem;
      text-align:center;
      color: var(--muted);
      background: #fff;
    }

    .status-tag{
      font-weight: 900;
      border-radius: 999px;
    }

    .header-line{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:1rem;
    }

    .small-meta{
      text-align:right;
      font-size:.85rem;
      color: var(--muted);
      font-weight:700;
    }

    @media (max-width: 768px){
      .kv-grid{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px){
      .kv-grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="page-wrap">

      <div class="topbar">
        <div>
          <h1>Dashboard Turnaround</h1>
          <p class="muted mb-0">Vols en cours de traitement</p>
        </div>

        <div class="tags are-medium mb-0">
          <span id="connState" class="tag is-warning status-tag">Connexion…</span>
          <span id="lastUpdate" class="tag is-light status-tag">--</span>
        </div>
      </div>

      <div id="cards" class="columns is-multiline"></div>

    </div>
  </section>

  <script>
    const socket = new WebSocket("wss://turnaround-sync.deruellehugo-49c.workers.dev/dashboard");
    const flights = new Map();

    function hasValue(v) {
      return v !== undefined && v !== null && String(v).trim() !== "";
    }

    function parseTimeToMinutes(hhmm) {
      if (!hhmm || !String(hhmm).includes(":")) return null;
      const [h, m] = hhmm.split(":").map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return null;
      return h * 60 + m;
    }

    function computeCD(flight) {
      const ref = flight.AOBT || flight.EOBT || flight.SOBT || "";
      const mins = parseTimeToMinutes(ref);
      if (mins === null) return { text: "--", bulmaClass: "has-text-grey" };

      const now = new Date();
      const nowMins = now.getHours() * 60 + now.getMinutes();
      let diff = mins - nowMins;

      if (diff > 720) diff -= 1440;
      if (diff < -720) diff += 1440;

      const sign = diff < 0 ? "-" : "";
      const abs = Math.abs(diff);
      const hh = String(Math.floor(abs / 60)).padStart(2, "0");
      const mm = String(abs % 60).padStart(2, "0");

      let bulmaClass = "has-text-success";
      if (diff <= 15 && diff >= 0) bulmaClass = "has-text-warning";
      if (diff < 0) bulmaClass = "has-text-danger";

      return {
        text: `${sign}${hh}:${mm}`,
        bulmaClass
      };
    }

    function computeStatus(f) {
      if (hasValue(f.AOBT)) {
        return { text: "Départ", tagClass: "is-success" };
      }
      if (hasValue(f.FermeturePorteAvion)) {
        return { text: "Porte avion fermée", tagClass: "is-link" };
      }
      if (hasValue(f.AvionDernierEmbarque)) {
        return { text: "Embarquement terminé", tagClass: "is-success" };
      }
      if (hasValue(f.AvionPremierEmbarque)) {
        return { text: "Embarquement en cours", tagClass: "is-link" };
      }
      if (hasValue(f.DernierDebarque)) {
        return { text: "Débarquement terminé", tagClass: "is-success" };
      }
      if (hasValue(f.PremierDebarque)) {
        return { text: "Débarquement en cours", tagClass: "is-link" };
      }
      if (hasValue(f.AIBT)) {
        return { text: "Au bloc", tagClass: "is-warning" };
      }
      return { text: "En attente", tagClass: "is-light" };
    }

    function isActiveFlight(f) {
      const started =
        hasValue(f.AIBT) ||
        hasValue(f.PremierDebarque) ||
        hasValue(f.DernierDebarque) ||
        hasValue(f.AvionPremierEmbarque) ||
        hasValue(f.AvionDernierEmbarque) ||
        hasValue(f.FermeturePorteAvion);

      const notDeparted = !hasValue(f.AOBT);

      return started && notDeparted;
    }

    function renderSteps(f) {
      const steps = [
        ["Au bloc", hasValue(f.AIBT)],
        ["Débarquement en cours", hasValue(f.PremierDebarque)],
        ["Débarquement terminé", hasValue(f.DernierDebarque)],
        ["Embarquement en cours", hasValue(f.AvionPremierEmbarque)],
        ["Embarquement terminé", hasValue(f.AvionDernierEmbarque)],
        ["Porte avion fermée", hasValue(f.FermeturePorteAvion)],
        ["Départ", hasValue(f.AOBT)]
      ];

      return steps.map(([label, done]) => {
        return `<span class="timeline-chip ${done ? "is-done" : ""}">${label}</span>`;
      }).join("");
    }

    function render() {
      const cards = document.getElementById("cards");

      const activeFlights = [...flights.values()]
        .filter(isActiveFlight)
        .sort((a, b) => {
          const ta = parseTimeToMinutes(a.SOBT || a.EOBT || "99:99") ?? 9999;
          const tb = parseTimeToMinutes(b.SOBT || b.EOBT || "99:99") ?? 9999;
          return ta - tb;
        });

      if (!activeFlights.length) {
        cards.innerHTML = `
          <div class="column is-12">
            <div class="empty-box">
              Aucun vol en cours de traitement
            </div>
          </div>
        `;
        return;
      }

      cards.innerHTML = activeFlights.map(f => {
        const cd = computeCD(f);
        const status = computeStatus(f);

        return `
          <div class="column is-4-desktop is-6-tablet is-12-mobile">
            <div class="card dashboard-card">
              <div class="card-content">
                <div class="header-line">
                  <div>
                    <div class="flight-title">${f.NVol || "--"}</div>
                    <div class="flight-subtitle">${f.To || "--"}</div>
                  </div>
                  <div class="small-meta">
                    <div>${f.Immat || ""}</div>
                  </div>
                </div>

                <div class="mt-3 mb-3">
                  <span class="tag ${status.tagClass} is-medium status-tag">${status.text}</span>
                </div>

                <div class="kv-grid">
                  <div class="kv-box">
                    <div class="kv-k">SIBT</div>
                    <div class="kv-v">${f.SIBT || "--:--"}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">AIBT</div>
                    <div class="kv-v">${f.AIBT || "--:--"}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">SOBT</div>
                    <div class="kv-v">${f.SOBT || "--:--"}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">AOBT / EOBT</div>
                    <div class="kv-v">${f.AOBT || f.EOBT || "--:--"}</div>
                  </div>

                  <div class="kv-box">
                    <div class="kv-k">CD</div>
                    <div class="kv-v cd-value ${cd.bulmaClass}">${cd.text}</div>
                  </div>
                </div>

                <div class="timeline-wrap">
                  ${renderSteps(f)}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      document.getElementById("lastUpdate").textContent =
        `Maj : ${new Date().toLocaleTimeString("fr-FR")}`;
    }

    socket.onopen = () => {
      document.getElementById("connState").className = "tag is-success is-medium status-tag";
      document.getElementById("connState").textContent = "Connecté";
    };

    socket.onclose = () => {
      document.getElementById("connState").className = "tag is-danger is-medium status-tag";
      document.getElementById("connState").textContent = "Déconnecté";
    };

    socket.onerror = () => {
      document.getElementById("connState").className = "tag is-danger is-medium status-tag";
      document.getElementById("connState").textContent = "Erreur WebSocket";
    };

    socket.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.__type === "snapshot") {
        flights.clear();
        (msg.flights || []).forEach(f => {
          flights.set(f.flightKey, f);
        });
        render();
        return;
      }

      if (msg.__type === "patch") {
        const current = flights.get(msg.flightKey) || { flightKey: msg.flightKey };
        flights.set(msg.flightKey, { ...current, ...msg.payload });
        render();
        return;
      }

      if (msg.__type === "remove") {
        flights.delete(msg.flightKey);
        render();
      }
    };
  </script>
</body>
</html>
