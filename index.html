<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Turnaround</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">

<style>
:root{
--bg:#f6f7fb;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:rgba(17,24,39,.08);
--shadow:0 10px 24px rgba(0,0,0,.08);
}

html,body{
background:var(--bg);
color:var(--text);
min-height:100%;
}

.page-wrap{
max-width:1600px;
margin:0 auto;
padding:18px;
}

.dashboard-card{
border-radius:18px;
box-shadow:var(--shadow);
background:var(--card);
border:1px solid var(--border);
overflow:hidden;
height:100%;
}

.dashboard-card .card-content{
padding:1rem;
}

.flight-title{
font-size:1.35rem;
font-weight:900;
}

.flight-subtitle{
color:var(--muted);
font-weight:700;
margin-top:4px;
}

.muted{
color:var(--muted);
}

.kv-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:.75rem;
margin-top:.75rem;
margin-bottom:.9rem;
}

.kv-box{
border:1px solid var(--border);
border-radius:14px;
padding:.8rem;
background:rgba(255,255,255,.55);
}

.kv-k{
font-size:.72rem;
text-transform:uppercase;
color:var(--muted);
font-weight:800;
margin-bottom:.25rem;
}

.kv-v{
font-size:1rem;
font-weight:900;
}

.cd-value{
font-size:1.25rem;
font-weight:900;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:1rem;
flex-wrap:wrap;
margin-bottom:1rem;
}

.topbar h1{
font-size:1.5rem;
font-weight:900;
margin:0;
}

.empty-box{
border:2px dashed var(--border);
border-radius:18px;
padding:2rem;
text-align:center;
color:var(--muted);
background:#fff;
}

.status-tag{
font-weight:900;
border-radius:999px;
}

.header-line{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:1rem;
}
.close-btn{
background:none;border:none;cursor:pointer;color:var(--muted);
font-size:1.2rem;line-height:1;padding:2px 6px;border-radius:8px;
transition:background .15s,color .15s;flex-shrink:0;
}
.close-btn:hover{background:rgba(239,68,68,.1);color:#ef4444;}

.small-meta{
text-align:right;
font-size:.85rem;
color:var(--muted);
font-weight:700;
}

@media(max-width:768px){
.kv-grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:480px){
.kv-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<section class="section">
<div class="page-wrap">

<div class="topbar">
<div>
<h1>Dashboard Turnaround</h1>
<p class="muted mb-0">Vols en cours de traitement</p>
</div>

<div class="tags are-medium mb-0">
<span id="connState" class="tag is-warning status-tag">Connexion…</span>
<span id="lastUpdate" class="tag is-light status-tag">--</span>
</div>
</div>

<div id="cards" class="columns is-multiline"></div>

</div>
</section>

<script>

const WS_URL="wss://turnaround-sync.deruellehugo-49c.workers.dev/dashboard"

let socket=null
let reconnectTimer=null
const flights=new Map()

function connect() {

  socket = new WebSocket(WS_URL);

  socket.onopen = () => {
    clearTimeout(reconnectTimer);
    setConn("is-success", "Connecté");
    console.log("DASHBOARD WS CONNECTED");
  };

  socket.onclose = () => {
    setConn("is-danger", "Déconnecté");
    console.log("DASHBOARD WS CLOSED");
    scheduleReconnect();
  };

  socket.onerror = (err) => {
    setConn("is-danger", "Erreur");
    console.error("DASHBOARD WS ERROR", err);
  };

  socket.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      console.log("DASHBOARD WS RECEIVED", msg);
      handleMessage(msg);
    } catch (e) {
      console.error("DASHBOARD WS PARSE ERROR", event.data);
    }
  };

}

function scheduleReconnect(){
clearTimeout(reconnectTimer)
reconnectTimer=setTimeout(connect,3000)
}

function setConn(cls,txt){
const el=document.getElementById("connState")
el.className="tag "+cls+" status-tag"
el.textContent=txt
}

function hasValue(v){
return v!==undefined && v!==null && String(v).trim()!=""
}

function parseHHMM(t){
if(!t||!String(t).includes(":"))return null
const[h,m]=t.split(":").map(Number)
if(isNaN(h)||isNaN(m))return null
return h*60+m
}

function fmtHHMM(min){
const v=((min%1440)+1440)%1440
const h=Math.floor(v/60)
const m=v%60
return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`
}

function isActiveFlight(f){

const started=
hasValue(f.AIBT)||
hasValue(f.PremierDebarque)||
hasValue(f.DernierDebarque)||
hasValue(f.AvionPremierEmbarque)||
hasValue(f.AvionDernierEmbarque)||
hasValue(f.FermeturePorteAvion)

const notDeparted=!hasValue(f.AOBT)

return started && notDeparted
}

function computeStatus(f){

if(hasValue(f.AOBT))return{text:"Départ",tagClass:"is-success"}

if(hasValue(f.FermeturePorteAvion))
return{text:"Porte avion fermée",tagClass:"is-link"}

if(hasValue(f.AvionDernierEmbarque))
return{text:"Embarquement terminé",tagClass:"is-link"}

if(hasValue(f.AvionPremierEmbarque))
return{text:"Embarquement en cours",tagClass:"is-link"}

if(hasValue(f.DernierDebarque))
return{text:"Débarquement terminé",tagClass:"is-link"}

if(hasValue(f.PremierDebarque))
return{text:"Débarquement en cours",tagClass:"is-link"}

if(hasValue(f.AIBT))
return{text:"Au bloc",tagClass:"is-link"}

return{text:"En attente",tagClass:"is-light"}
}

function render() {
  const cards = document.getElementById("cards");

  const active = [...flights.values()]
    .filter(isActiveFlight)
    .sort((a, b) => {
      const ta = parseHHMM(a.SOBT) || 9999;
      const tb = parseHHMM(b.SOBT) || 9999;
      return ta - tb;
    });

  if (!active.length) {
    cards.innerHTML = `
      <div class="column is-12">
        <div class="empty-box">
          Aucun vol en cours de traitement
        </div>
      </div>
    `;
    return;
  }

  cards.innerHTML = active.map(f => {
    console.log("RENDER FLIGHT =", f);

    const status = computeStatus(f);
    const flightNumber = `${f.Cie || ""}${f.NVol || ""}`.trim() || "--";
    const countdown = computeCountdown(f);

    const arrVol  = f.Cie && f.NVol ? (f.Cie + f.NVol) : "";
    const route   = [f.From, f.To].filter(Boolean).join(" → ") || "--";

    return `
      <div class="column is-4-desktop is-6-tablet is-12-mobile">
        <div class="card dashboard-card">
          <div class="card-content">

            <div class="header-line">
              <div>
                <div class="flight-title">${arrVol || "--"}</div>
                <div class="flight-subtitle">${route}${f.Immat ? " · " + f.Immat : ""}${f.TypeAvion ? " · " + f.TypeAvion : ""}</div>
              </div>
              <button class="close-btn" onclick="deleteFlight('${f.flightKey}')" title="Fermer">✕</button>
            </div>

            <div class="mt-3 mb-3">
              <span class="tag ${status.tagClass} is-medium status-tag">
                ${status.text}
              </span>
            </div>

            <div class="kv-grid">

              <div class="kv-box">
                <div class="kv-k">SIBT</div>
                <div class="kv-v">${f.SIBT || "--:--"}</div>
              </div>

              <div class="kv-box">
                <div class="kv-k">AIBT</div>
                <div class="kv-v">${f.AIBT || "--:--"}</div>
              </div>

              <div class="kv-box">
                <div class="kv-k">SOBT</div>
                <div class="kv-v">${f.SOBT || "--:--"}</div>
              </div>

              <div class="kv-box">
                <div class="kv-k">EOBT</div>
                <div class="kv-v">${f.EOBT || "--:--"}</div>
              </div>

              <div class="kv-box">
                <div class="kv-k">CD</div>
                <div class="kv-v">${countdown || "--:--"}</div>
              </div>

              <div class="kv-box">
                <div class="kv-k">AOBT</div>
                <div class="kv-v">${f.AOBT || "--:--"}</div>
              </div>

            </div>

          </div>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("lastUpdate").textContent =
    "Maj : " + new Date().toLocaleTimeString("fr-FR");
}

function computeCountdown(f) {
  const ref = f.EOBT || f.SOBT;
  if (!ref || !String(ref).includes(":")) return "";

  const [hh, mm] = String(ref).split(":").map(Number);
  if (Number.isNaN(hh) || Number.isNaN(mm)) return "";

  const now = new Date();
  const target = new Date();
  target.setHours(hh, mm, 0, 0);

  const diffMs = target.getTime() - now.getTime();
  const totalMin = Math.round(diffMs / 60000);

  const sign = totalMin < 0 ? "-" : "";
  const abs = Math.abs(totalMin);
  const h = Math.floor(abs / 60);
  const m = abs % 60;

  return `${sign}${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
}

function handleMessage(msg){

if(msg.__type==="snapshot"){

flights.clear()

;(msg.flights||[]).forEach(f=>{
if(f.flightKey)flights.set(f.flightKey,f)
})

render()
return
}

if(msg.__type==="patch"){

if(!msg.flightKey)return

const current=flights.get(msg.flightKey)||{flightKey:msg.flightKey}

flights.set(msg.flightKey,{
...current,
...(msg.payload||{})
})

render()
return
}

if(msg.__type==="remove"){

flights.delete(msg.flightKey)
render()

}

}

setInterval(render,1000)

connect()


async function deleteFlight(flightKey){
  if(!flightKey) return;
  // Suppression locale immédiate
  flights.delete(flightKey);
  render();
  // Notification au serveur (best-effort)
  try{
    const res = await fetch(
      `https://turnaround-sync.deruellehugo-49c.workers.dev/${encodeURIComponent(flightKey)}`,
      { method: "DELETE", credentials: "include" }
    );
    console.log("DELETE", flightKey, res.status);
  }catch(e){ console.error("Delete error", e); }
}
</script>

</body>
</html>
