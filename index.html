<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Turnaround</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">

<style>
:root{
--bg:#f6f7fb;
--card:#ffffff;
--border:rgba(17,24,39,.08);
--shadow:0 10px 24px rgba(0,0,0,.08);
--muted:#6b7280;
}

html,body{
background:var(--bg);
}

.page-wrap{
max-width:1600px;
margin:auto;
padding:20px;
}

.dashboard-card{
border-radius:16px;
background:var(--card);
box-shadow:var(--shadow);
border:1px solid var(--border);
}

.flight-title{
font-size:1.3rem;
font-weight:900;
}

.flight-subtitle{
color:var(--muted);
font-weight:700;
}

.kv-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.kv-box{
border:1px solid var(--border);
border-radius:12px;
padding:10px;
}

.kv-k{
font-size:.7rem;
text-transform:uppercase;
color:var(--muted);
font-weight:700;
}

.kv-v{
font-size:1rem;
font-weight:900;
}

.cd-value{
font-size:1.3rem;
font-weight:900;
}

.header-line{
display:flex;
justify-content:space-between;
align-items:flex-start;
}

.small-meta{
font-size:.85rem;
color:var(--muted);
}

.empty-box{
border:2px dashed var(--border);
padding:30px;
border-radius:12px;
text-align:center;
color:var(--muted);
}
</style>
</head>

<body>

<section class="section">
<div class="page-wrap">

<div class="level mb-4">
<div>
<h1 class="title is-4">Dashboard Turnaround</h1>
<p class="has-text-grey">Vols en cours</p>
</div>

<div class="tags">
<span id="connState" class="tag is-warning">Connexion…</span>
<span id="lastUpdate" class="tag is-light">--</span>
</div>
</div>

<div id="cards" class="columns is-multiline"></div>

</div>
</section>

<script>

const socket = new WebSocket("wss://turnaround-sync.deruellehugo-49c.workers.dev/dashboard");
const flights = new Map();

function hasValue(v){
return v!==undefined && v!==null && String(v).trim()!="";
}

function parseHHMM(txt){
if(!txt||!txt.includes(":")) return null;
const[h,m]=txt.split(":").map(Number);
if(!Number.isFinite(h)||!Number.isFinite(m)) return null;
return h*60+m;
}

function diffSigned(t,ref){
let d=t-ref;
if(d>720)d-=1440;
if(d<-720)d+=1440;
return d;
}

function nowMinutes(){
const n=new Date();
return{
mins:n.getHours()*60+n.getMinutes(),
secs:n.getSeconds()
};
}

function fmtHHMM(mins){
const v=((mins%1440)+1440)%1440;
const h=Math.floor(v/60);
const m=v%60;
return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function computeTOBTData(f){

const cie=(f.Cie||"").toUpperCase();
const from=(f.From||"").toUpperCase().trim();
const isBVA=from==="BVA";

const SIBT=parseHHMM(isBVA?f.SOBT:f.SIBT);
const SOBT=parseHHMM(f.SOBT);

if(SIBT==null||SOBT==null)return{raw:null,adj:null};

const AIBT=isBVA?SOBT:(parseHHMM(f.AIBT)||SIBT);

const SIBT_ext=SIBT;
const AIBT_ext=SIBT_ext+diffSigned(AIBT,SIBT);
const SOBT_ext=SIBT_ext+diffSigned(SOBT,SIBT);

const crewChange=hasValue(f.ArrPNT)||hasValue(f.ArrPNC);

let TOBT_raw_ext;

if(AIBT_ext<=SIBT_ext){
TOBT_raw_ext=SOBT_ext;
}else{

if(cie==="FR"||cie==="RK"){

const turn=crewChange?35:25;
const cand=AIBT_ext+turn;
TOBT_raw_ext=cand<=SOBT_ext?SOBT_ext:cand;

}else{

const rot=SOBT_ext-SIBT_ext;
TOBT_raw_ext=AIBT_ext+rot;

}

}

let TOBT_adj_ext=TOBT_raw_ext;

const CTOT=parseHHMM(f.CTOT);

if(CTOT!=null){

const ref=((TOBT_raw_ext%1440)+1440)%1440;
const CTOT_ext=TOBT_raw_ext+diffSigned(CTOT,ref);

if(CTOT_ext>TOBT_raw_ext+15){
TOBT_adj_ext=CTOT_ext-15;
}

}

return{
raw:((TOBT_raw_ext%1440)+1440)%1440,
adj:((TOBT_adj_ext%1440)+1440)%1440
};

}

function computeCD(f){

const SOBT=parseHHMM(f.SOBT);
const SIBT=parseHHMM(f.SIBT);
const AIBT=parseHHMM(f.AIBT);

if(SOBT==null||SIBT==null)return{text:"--:--",cls:"has-text-grey"};

let target;

if(AIBT!=null&&AIBT>SIBT){

const tobt=computeTOBTData(f).raw;
if(tobt==null)return{text:"--:--",cls:"has-text-grey"};
target=tobt;

}else{
target=SOBT;
}

if(hasValue(f.AOBT)){

const AOBT=parseHHMM(f.AOBT);
let diff=AOBT-target;
if(diff>720)diff-=1440;
if(diff<-720)diff+=1440;

const sec=diff*60;
const sign=sec>=0?"+":"-";
const abs=Math.abs(sec);

return{
text:`${sign}${String(Math.floor(abs/60)).padStart(2,"0")}:${String(abs%60).padStart(2,"0")}`,
cls:sec>0?"has-text-danger":"has-text-success"
};

}

const now=nowMinutes();
let diff=target-now.mins;

if(diff>720)diff-=1440;
if(diff<-720)diff+=1440;

const sec=diff*60-now.secs;
const abs=Math.abs(sec);

let cls="has-text-success";
if(sec<0)cls="has-text-danger";
else if(sec<900)cls="has-text-warning";

return{
text:`${sec<=0?"+":""}${String(Math.floor(abs/60)).padStart(2,"0")}:${String(abs%60).padStart(2,"0")}`,
cls
};

}

function getDisplayedOutTime(f){
if(hasValue(f.AOBT))return f.AOBT;
const t=computeTOBTData(f).adj;
return t?fmtHHMM(t):"--:--";
}

function computeStatus(f){

if(hasValue(f.AOBT))return{txt:"Départ",cls:"is-success"};
if(hasValue(f.FermeturePorteAvion))return{txt:"Porte avion fermée",cls:"is-link"};
if(hasValue(f.AvionDernierEmbarque))return{txt:"Embarquement terminé",cls:"is-link"};
if(hasValue(f.AvionPremierEmbarque))return{txt:"Embarquement en cours",cls:"is-link"};
if(hasValue(f.DernierDebarque))return{txt:"Débarquement terminé",cls:"is-link"};
if(hasValue(f.PremierDebarque))return{txt:"Débarquement en cours",cls:"is-link"};
if(hasValue(f.AIBT))return{txt:"Au bloc",cls:"is-link"};

return{txt:"En attente",cls:"is-light"};

}

function isActiveFlight(f){

const started=
hasValue(f.AIBT)||
hasValue(f.PremierDebarque)||
hasValue(f.DernierDebarque)||
hasValue(f.AvionPremierEmbarque)||
hasValue(f.AvionDernierEmbarque)||
hasValue(f.FermeturePorteAvion);

const notDeparted=!hasValue(f.AOBT);

return started&&notDeparted;

}

async function removeFlight(key){

if(!confirm("Fermer ce vol ?"))return;

await fetch(`https://turnaround-sync.deruellehugo-49c.workers.dev/${key}`,{
method:"DELETE"
});

}

function render(){

const cards=document.getElementById("cards");

const active=[...flights.values()].filter(isActiveFlight);

if(!active.length){

cards.innerHTML=`
<div class="column is-12">
<div class="empty-box">Aucun vol en cours</div>
</div>`;

return;

}

cards.innerHTML=active.map(f=>{

const cd=computeCD(f);
const out=getDisplayedOutTime(f);
const status=computeStatus(f);

return`

<div class="column is-4-desktop is-6-tablet">

<div class="card dashboard-card">
<div class="card-content">

<div class="header-line">

<div>
<div class="flight-title">${f.NVol||"--"}</div>
<div class="flight-subtitle">${f.To||"--"}</div>
</div>

<div style="display:flex;gap:8px;align-items:center;">

<div class="small-meta">${f.Immat||""}</div>

<button
class="delete is-small"
onclick="removeFlight('${f.flightKey}')"
></button>

</div>

</div>

<div class="mt-3 mb-3">
<span class="tag ${status.cls}">${status.txt}</span>
</div>

<div class="kv-grid">

<div class="kv-box">
<div class="kv-k">SIBT</div>
<div class="kv-v">${f.SIBT||"--:--"}</div>
</div>

<div class="kv-box">
<div class="kv-k">AIBT</div>
<div class="kv-v">${f.AIBT||"--:--"}</div>
</div>

<div class="kv-box">
<div class="kv-k">SOBT</div>
<div class="kv-v">${f.SOBT||"--:--"}</div>
</div>

<div class="kv-box">
<div class="kv-k">AOBT / TOBT</div>
<div class="kv-v">${out}</div>
</div>

<div class="kv-box">
<div class="kv-k">CD</div>
<div class="kv-v cd-value ${cd.cls}">${cd.text}</div>
</div>

</div>

</div>
</div>
</div>

`;

}).join("");

document.getElementById("lastUpdate").textContent=
new Date().toLocaleTimeString("fr-FR");

}

socket.onopen=()=>{
connState.className="tag is-success";
connState.textContent="Connecté";
};

socket.onclose=()=>{
connState.className="tag is-danger";
connState.textContent="Déconnecté";
};

socket.onerror=()=>{
connState.className="tag is-danger";
connState.textContent="Erreur";
};

socket.onmessage=(event)=>{

const msg=JSON.parse(event.data);

if(msg.__type==="snapshot"){
flights.clear();
msg.flights.forEach(f=>flights.set(f.flightKey,f));
render();
return;
}

if(msg.__type==="patch"){
const cur=flights.get(msg.flightKey)||{};
flights.set(msg.flightKey,{...cur,...msg.payload});
render();
return;
}

if(msg.__type==="remove"){
flights.delete(msg.flightKey);
render();
}

};

setInterval(render,1000);

</script>

</body>
</html>
